services:
  - type: web
    name: signalbrief-web
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate && npm run db:seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BRIEFING_PROVIDER
        value: rules-fallback
      - key: DATABASE_URL
        fromDatabase:
          name: signalbrief-db
          property: connectionString
    healthCheckPath: /

databases:
  - name: signalbrief-db
    plan: free
