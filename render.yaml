services:
  - type: web
    name: signalbrief-web
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: bash scripts/render-start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: BRIEFING_PROVIDER
        value: rules-fallback
      - key: OLLAMA_ENABLED
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: signalbrief-db
          property: connectionString
    healthCheckPath: /

databases:
  - name: signalbrief-db
    plan: free
