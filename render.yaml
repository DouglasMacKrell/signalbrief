services:
  - type: web
    name: signalbrief-web
    runtime: node
    plan: free
    buildCommand: bash scripts/render-build.sh
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: HUSKY
        value: "0"
      - key: BRIEFING_PROVIDER
        value: rules-fallback
      - key: OLLAMA_ENABLED
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: signalbrief-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: signalbrief-db
    plan: free
