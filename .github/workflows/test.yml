name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: signalbrief
          POSTGRES_PASSWORD: signalbrief
          POSTGRES_DB: signalbrief
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U signalbrief"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://signalbrief:signalbrief@localhost:5432/signalbrief
      BRIEFING_PROVIDER: rules-fallback
      OLLAMA_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - run: npm run test:integration

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: signalbrief
          POSTGRES_PASSWORD: signalbrief
          POSTGRES_DB: signalbrief
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U signalbrief"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://signalbrief:signalbrief@localhost:5432/signalbrief
      BRIEFING_PROVIDER: rules-fallback
      OLLAMA_ENABLED: "false"
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
