name: Keep Render warm

# Pings the live demo so free-tier instances stay awake before interviews.
# Manual: Actions → Keep Render warm → Run workflow (do this ~30 min before a screen share).

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          HEALTH_URL: https://signalbrief-web.onrender.com/api/health
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/health.json -w "%{http_code}" \
            --retry 5 --retry-delay 10 --retry-all-errors \
            --max-time 90 "$HEALTH_URL")
          echo "HTTP $code"
          cat /tmp/health.json
          echo "$code" | grep -qE '^(200|204)$'
